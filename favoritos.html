<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Favoritos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card:hover {
      transform: scale(1.05);
      z-index: 10;
    }
    
    .poster {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }
    
    .poster::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 25%, rgba(0, 0, 0, 0.1) 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .card:hover .poster::after {
      opacity: 1;
    }
    
    .play-overlay {
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .card:hover .play-overlay {
      opacity: 1;
    }

    /* Fondo blur con transición suave */
    #background img {
      filter: blur(50px) brightness(0.45);
      transition: opacity 1.5s ease-in-out;
    }

    .delete-btn {
      opacity: 0;
      transition: all 0.3s ease;
    }
    .card:hover .delete-btn {
      opacity: 1;
    }
  </style>
</head>
<body class="bg-[#0A0A0A] text-white min-h-screen relative">

  <!-- Fondo dinámico blur con imágenes de los favoritos guardados -->
  <div id="background" class="fixed inset-0 z-[-1] overflow-hidden">
    <img id="bg1" class="absolute inset-0 w-full h-full object-cover" alt="">
    <img id="bg2" class="absolute inset-0 w-full h-full object-cover opacity-0" alt="">
  </div>

  <div class="max-w-screen-2xl mx-auto px-8 py-10 relative z-10">
    
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-4">
        <i class="fa-solid fa-heart text-red-500 text-3xl"></i>
        <h1 class="text-4xl font-bold tracking-tight">Mis Favoritos</h1>
      </div>
      <div class="flex items-center gap-4">
        <p id="contador" class="text-zinc-400 text-sm flex items-center gap-2">
          <i class="fa-solid fa-circle-notch fa-spin"></i>
          Cargando...
        </p>
        <button onclick="deleteAllFavorites()" 
                class="flex items-center gap-2 bg-red-600/90 hover:bg-red-700 text-white text-sm px-5 py-2 rounded-full transition">
          <i class="fa-solid fa-trash"></i>
          <span>Eliminar todos</span>
        </button>
      </div>
    </div>

    <!-- GRID RESPONSIVO -->
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-8 pb-20">
      <!-- Tarjetas generadas por JavaScript -->
    </div>
  </div>

  <!-- ====================== SCRIPT FIRESTORE + UI ====================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDA6mRLGymepNx3EXoCOH7CUiBXd6syGeg",
      authDomain: "sign-in-method-b7675.firebaseapp.com",
      projectId: "sign-in-method-b7675",
      storageBucket: "sign-in-method-b7675.firebasestorage.app",
      messagingSenderId: "713340652755",
      appId: "1:713340652755:web:57fc07b795dc503391d826",
      measurementId: "G-E7C8KNRSSZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let favoritos = [];
    let currentUserUid = null;

    // ==================== LOCALSTORAGE ====================
    function saveCredentials(email, password) {
      localStorage.setItem("email", email);
      localStorage.setItem("password", password);
    }
    function clearCredentials() {
      localStorage.removeItem("email");
      localStorage.removeItem("password");
    }

    // ==================== AUTO-LOGIN ====================
    async function tryAutoLogin() {
      const params = new URLSearchParams(window.location.search);
      let email = params.get("email");
      let password = params.get("pass");
      if (!email || !password) {
        email = localStorage.getItem("email");
        password = localStorage.getItem("password");
      }
      if (!email || !password) return false;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        saveCredentials(email, password);
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        return true;
      } catch (e) {
        console.error("Autologin falló:", e);
        clearCredentials();
        return false;
      }
    }

    // ==================== ELIMINAR UN FAVORITO ====================
    async function deleteFavorite(docId) {
      if (!currentUserUid || !confirm("¿Eliminar este contenido de favoritos?")) return;
      try {
        await deleteDoc(doc(db, `users/${currentUserUid}/favorites`, docId));
        favoritos = favoritos.filter(f => f.id !== docId);
        renderizarGrid();
        iniciarFondoDinamico();
      } catch (e) {
        alert("Error al eliminar");
      }
    }

    // ==================== ELIMINAR TODOS ====================
    async function deleteAllFavorites() {
      if (!currentUserUid || favoritos.length === 0) return;
      if (!confirm(`¿Eliminar los ${favoritos.length} favoritos? Esta acción es irreversible.`)) return;
      try {
        for (const fav of favoritos) {
          await deleteDoc(doc(db, `users/${currentUserUid}/favorites`, fav.id));
        }
        favoritos = [];
        renderizarGrid();
        iniciarFondoDinamico();
      } catch (e) {
        alert("Error al eliminar todos");
      }
    }

    // ==================== CARGAR FAVORITOS DESDE FIRESTORE ====================
    async function loadFavoritos() {
      await tryAutoLogin();
      const user = auth.currentUser;
      if (!user) {
        const loginUrl = "https://lzrdrz10.github.io/log/";
        const returnTo = encodeURIComponent(window.location.href);
        window.location.href = `${loginUrl}?returnTo=${returnTo}`;
        return;
      }

      currentUserUid = user.uid;

      try {
        const q = query(collection(db, `users/${user.uid}/favorites`), orderBy("savedAt", "desc"));
        const snapshot = await getDocs(q);

        favoritos = snapshot.docs.map(doc => {
          const data = doc.data();
          return {
            id: doc.id,
            title: data.title || "Sin título",
            poster: data.poster || "https://via.placeholder.com/780x439?text=No+Image",
            year: data.year || "—",
            synopsis: data.synopsis || "",
            rating: data.rating || "",
            duration: data.duration || "",
            type: data.type || "unknown",   // movie, serie, capitulo
            url: data.url
          };
        });

        renderizarGrid();
        iniciarFondoDinamico();

        document.getElementById('contador').innerHTML = `
          <i class="fa-solid fa-heart text-red-500"></i>
          ${favoritos.length} contenidos guardados
        `;

      } catch (e) {
        console.error("Error al cargar favoritos:", e);
        document.getElementById('grid').innerHTML = `
          <div class="col-span-full text-center py-12 text-red-400">
            <i class="fa-solid fa-triangle-exclamation text-6xl mb-6"></i>
            <p class="text-xl">Error al cargar tus favoritos.<br>Intenta recargar la página.</p>
          </div>`;
      }
    }

    // ==================== RENDERIZAR GRID (con todos los nuevos campos) ====================
    function renderizarGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (favoritos.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-20">
            <i class="fa-solid fa-heart text-8xl text-zinc-600 mb-6"></i>
            <h2 class="text-3xl font-semibold mb-3">Aún no tienes favoritos</h2>
            <p class="text-zinc-400 max-w-md mx-auto">Ve a cualquier película, serie o capítulo y presiona el botón ❤️ para guardarlo aquí.</p>
          </div>`;
        return;
      }

      favoritos.forEach(fav => {
        // Icono según tipo
        let typeIcon = 'fa-film';
        let typeColor = 'bg-red-600';
        let typeText = 'Película';
        if (fav.type === 'serie') {
          typeIcon = 'fa-tv';
          typeColor = 'bg-purple-600';
          typeText = 'Serie';
        } else if (fav.type === 'capitulo') {
          typeIcon = 'fa-list';
          typeColor = 'bg-blue-600';
          typeText = 'Capítulo';
        }

        const cardHTML = `
          <div class="card cursor-pointer group relative">
            <a href="${fav.url}" target="_blank" class="block">
              <div class="poster">
                <img src="${fav.poster}" 
                     class="w-full aspect-video object-cover rounded-2xl" 
                     alt="${fav.title}">
                
                <!-- Overlay play -->
                <div class="play-overlay absolute inset-0 flex items-center justify-center">
                  <div class="w-14 h-14 bg-white/90 hover:bg-white rounded-full flex items-center justify-center shadow-2xl transition">
                    <i class="fa-solid fa-play text-black ml-0.5 text-2xl"></i>
                  </div>
                </div>
                
                <!-- Badge Tipo -->
                <div class="absolute top-4 left-4 ${typeColor} text-white text-xs font-bold px-4 py-1 rounded-full flex items-center gap-1">
                  <i class="fa-solid ${typeIcon}"></i>
                  ${typeText}
                </div>
              </div>
              
              <div class="mt-4 px-1">
                <h3 class="font-semibold text-xl leading-tight line-clamp-1">${fav.title}</h3>
                
                <div class="flex items-center gap-3 text-sm text-zinc-400 mt-2">
                  <span class="font-medium flex items-center gap-1">
                    <i class="fa-solid fa-calendar"></i>
                    ${fav.year}
                  </span>
                  ${fav.rating ? `
                    <span class="flex items-center gap-1">
                      <i class="fa-solid fa-star text-amber-400"></i>
                      <span>${fav.rating}</span>
                    </span>` : ''}
                  ${fav.duration ? `
                    <span class="flex items-center gap-1">
                      <i class="fa-solid fa-clock"></i>
                      <span>${fav.duration}</span>
                    </span>` : ''}
                </div>
                
                <p class="text-zinc-400 text-sm mt-2 line-clamp-2">
                  ${fav.synopsis || 'Sin sinopsis disponible.'}
                </p>
              </div>
            </a>
            
            <!-- Botón eliminar -->
            <button onclick="event.stopImmediatePropagation(); deleteFavorite('${fav.id}');" 
                    class="delete-btn absolute top-4 right-4 bg-red-600 hover:bg-red-700 text-white text-xl w-9 h-9 rounded-full flex items-center justify-center shadow-lg">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        `;
        grid.innerHTML += cardHTML;
      });
    }

    // ==================== FONDO BLUR DINÁMICO (usa los posters guardados) ====================
    function iniciarFondoDinamico() {
      const backdrops = favoritos.map(f => f.poster).filter(Boolean);
      if (backdrops.length === 0) return;

      const bg1 = document.getElementById('bg1');
      const bg2 = document.getElementById('bg2');
      
      let indice = 0;
      let activo = bg1;
      let inactivo = bg2;

      bg1.src = backdrops[0];

      setInterval(() => {
        indice = (indice + 1) % backdrops.length;
        inactivo.src = backdrops[indice];
        
        activo.style.opacity = '0';
        inactivo.style.opacity = '1';
        
        [activo, inactivo] = [inactivo, activo];
      }, 7000);
    }

    // ==================== INICIO ====================
    window.addEventListener("load", loadFavoritos);

    // Exponer funciones globales para los botones onclick
    window.deleteFavorite = deleteFavorite;
    window.deleteAllFavorites = deleteAllFavorites;
  </script>
</body>
</html>
