<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Favoritos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card:hover {
      transform: scale(1.05);
      z-index: 10;
    }
    
    .poster {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }
    
    .poster::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 25%, rgba(0, 0, 0, 0.1) 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .card:hover .poster::after {
      opacity: 1;
    }
    
    .play-overlay {
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .card:hover .play-overlay {
      opacity: 1;
    }

    /* Fondo blur */
    #background img {
      filter: blur(50px) brightness(0.45);
      transition: opacity 1.5s ease-in-out;
    }

    /* Botón eliminar SIEMPRE visible */
    .delete-btn {
      transition: all 0.2s ease;
    }
  </style>
</head>
<body class="bg-[#0A0A0A] text-white min-h-screen relative">

  <!-- Fondo dinámico blur -->
  <div id="background" class="fixed inset-0 z-[-1] overflow-hidden">
    <img id="bg1" class="absolute inset-0 w-full h-full object-cover" alt="">
    <img id="bg2" class="absolute inset-0 w-full h-full object-cover opacity-0" alt="">
  </div>

  <div class="max-w-screen-2xl mx-auto px-8 py-6 relative z-10">

    <!-- ====================== NUEVO HEADER ====================== -->
    <div class="flex items-center justify-between mb-10">
      
      <!-- Lado izquierdo: Botón atrás + Contador -->
      <div class="flex items-center gap-4">
        <button onclick="history.back()" 
                class="flex items-center justify-center w-11 h-11 bg-zinc-800 hover:bg-zinc-700 rounded-2xl transition">
          <i class="fa-solid fa-arrow-left text-2xl"></i>
        </button>
        
        <div class="flex items-center gap-3">
          <i class="fa-solid fa-heart text-red-500 text-3xl"></i>
          <div>
            <h1 class="text-4xl font-bold tracking-tight">Mis Favoritos</h1>
            <p id="contador-header" class="text-zinc-400 text-sm">0 contenidos mostrados</p>
          </div>
        </div>
      </div>

      <!-- Logo centrado -->
      <div class="flex-1 flex justify-center">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi3dK3-XAKrEia-lWmiUqAYRfFQ1lR9eJX6ZZH8e_vHf576qf9GJjIWBW9Jg5LsilXX7WO2MOEkg5gzc4pESziaPeMJ9ws9mwtCDdp3p_17D0e0Uop_ZxavwwJeNLBvoyZJ0cxTKQpjzrJIR6LjJslB24tj-77AYrRCacQ3F2S2VPoXpPzPhM1zndxyd1Rg/s3307/B64D5386-DCA4-410B-A0A6-6ACB19D0A06F.png" 
             alt="Logo" 
             class="h-14 object-contain">
      </div>

      <!-- Botón Eliminar todos (derecha) -->
      <button onclick="deleteAllFavorites()" 
              class="flex items-center gap-2 bg-red-600/90 hover:bg-red-700 text-white text-sm px-6 py-3 rounded-2xl transition">
        <i class="fa-solid fa-trash"></i>
        <span>Eliminar todos</span>
      </button>
    </div>

    <!-- GRID RESPONSIVO -->
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-8 pb-20">
      <!-- Tarjetas generadas por JavaScript -->
    </div>
  </div>

  <!-- ====================== SCRIPT ACTUALIZADO ====================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDA6mRLGymepNx3EXoCOH7CUiBXd6syGeg",
      authDomain: "sign-in-method-b7675.firebaseapp.com",
      projectId: "sign-in-method-b7675",
      storageBucket: "sign-in-method-b7675.firebasestorage.app",
      messagingSenderId: "713340652755",
      appId: "1:713340652755:web:57fc07b795dc503391d826",
      measurementId: "G-E7C8KNRSSZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let favoritos = [];
    let currentUserUid = null;

    // ==================== LOCALSTORAGE & AUTO-LOGIN (sin cambios) ====================
    function saveCredentials(email, password) { localStorage.setItem("email", email); localStorage.setItem("password", password); }
    function clearCredentials() { localStorage.removeItem("email"); localStorage.removeItem("password"); }

    async function tryAutoLogin() {
      const params = new URLSearchParams(window.location.search);
      let email = params.get("email") || localStorage.getItem("email");
      let password = params.get("pass") || localStorage.getItem("password");
      if (!email || !password) return false;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        saveCredentials(email, password);
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        return true;
      } catch (e) {
        console.error("Autologin falló:", e);
        clearCredentials();
        return false;
      }
    }

    // ==================== ELIMINAR ====================
    async function deleteFavorite(docId) {
      if (!currentUserUid || !confirm("¿Eliminar este contenido?")) return;
      try {
        await deleteDoc(doc(db, `users/${currentUserUid}/favorites`, docId));
        favoritos = favoritos.filter(f => f.id !== docId);
        renderizarGrid();
        iniciarFondoDinamico();
      } catch (e) { alert("Error al eliminar"); }
    }

    async function deleteAllFavorites() {
      if (!currentUserUid || favoritos.length === 0) return;
      if (!confirm(`¿Eliminar los ${favoritos.length} favoritos?`)) return;
      try {
        for (const fav of favoritos) await deleteDoc(doc(db, `users/${currentUserUid}/favorites`, fav.id));
        favoritos = [];
        renderizarGrid();
        iniciarFondoDinamico();
      } catch (e) { alert("Error al eliminar todos"); }
    }

    // ==================== CARGAR FAVORITOS ====================
    async function loadFavoritos() {
      await tryAutoLogin();
      const user = auth.currentUser;
      if (!user) {
        const loginUrl = "https://lzrdrz10.github.io/log/";
        window.location.href = `${loginUrl}?returnTo=${encodeURIComponent(window.location.href)}`;
        return;
      }

      currentUserUid = user.uid;

      try {
        const q = query(collection(db, `users/${user.uid}/favorites`), orderBy("savedAt", "desc"));
        const snapshot = await getDocs(q);

        favoritos = snapshot.docs.map(doc => {
          const data = doc.data();
          return {
            id: doc.id,
            title: data.title || "Sin título",
            poster: data.poster || "https://via.placeholder.com/780x439?text=No+Image",
            year: data.year || "—",
            synopsis: data.synopsis || "",
            rating: data.rating || "",
            duration: data.duration || "",
            type: data.type || "unknown",
            url: data.url,
            season: data.season || "",
            episode: data.episode || "",
            serieName: data.serieName || ""
          };
        });

        renderizarGrid();
        iniciarFondoDinamico();

      } catch (e) {
        console.error(e);
        document.getElementById('grid').innerHTML = `<div class="col-span-full text-center py-12 text-red-400"><i class="fa-solid fa-triangle-exclamation text-6xl mb-6"></i><p>Error al cargar favoritos.</p></div>`;
      }
    }

    // ==================== RENDERIZAR GRID (con todos los cambios pedidos) ====================
    function renderizarGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      if (favoritos.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-20">
            <i class="fa-solid fa-heart text-8xl text-zinc-600 mb-6"></i>
            <h2 class="text-3xl font-semibold mb-3">Aún no tienes favoritos</h2>
            <p class="text-zinc-400">Guarda películas, series o episodios con el botón ❤️</p>
          </div>`;
        document.getElementById('contador-header').innerHTML = `0 contenidos mostrados`;
        return;
      }

      // Actualizar contador del header
      document.getElementById('contador-header').innerHTML = `
        <span class="text-red-500 font-semibold">${favoritos.length}</span> contenidos mostrados
      `;

      favoritos.forEach(fav => {
        let typeIcon = 'fa-film', typeColor = 'bg-red-600', typeText = 'Película';
        if (fav.type === 'serie') { typeIcon = 'fa-tv'; typeColor = 'bg-purple-600'; typeText = 'Serie'; }
        else if (fav.type === 'episode') { typeIcon = 'fa-list'; typeColor = 'bg-blue-600'; typeText = 'Episodio'; }

        const cardHTML = `
          <div class="card cursor-pointer group relative">
            <a href="${fav.url}" class="block">   <!-- ← SIN target="_blank" para abrir en la misma página -->
              <div class="poster">
                <img src="${fav.poster}" class="w-full aspect-video object-cover rounded-2xl" alt="${fav.title}">
                
                <!-- Overlay play -->
                <div class="play-overlay absolute inset-0 flex items-center justify-center">
                  <div class="w-14 h-14 bg-white/90 hover:bg-white rounded-full flex items-center justify-center shadow-2xl transition">
                    <i class="fa-solid fa-play text-black ml-0.5 text-2xl"></i>
                  </div>
                </div>
                
                <!-- Badge tipo -->
                <div class="absolute top-4 left-4 ${typeColor} text-white text-xs font-bold px-4 py-1 rounded-full flex items-center gap-1">
                  <i class="fa-solid ${typeIcon}"></i> ${typeText}
                </div>
              </div>
              
              <div class="mt-4 px-1">
                <h3 class="font-semibold text-xl leading-tight line-clamp-1">${fav.title}</h3>
                <div class="flex items-center gap-3 text-sm text-zinc-400 mt-2">
                  ${fav.year && fav.year !== "—" ? `<span class="flex items-center gap-1"><i class="fa-solid fa-calendar"></i>${fav.year}</span>` : ''}
                  ${fav.rating ? `<span class="flex items-center gap-1"><i class="fa-solid fa-star text-amber-400"></i>${fav.rating}</span>` : ''}
                  ${fav.duration ? `<span class="flex items-center gap-1"><i class="fa-solid fa-clock"></i>${fav.duration}</span>` : ''}
                </div>
                <p class="text-zinc-400 text-sm mt-2 line-clamp-2">${fav.synopsis || 'Sin sinopsis disponible.'}</p>
              </div>
            </a>
            
            <!-- Botón X SIEMPRE VISIBLE -->
            <button onclick="event.stopImmediatePropagation(); deleteFavorite('${fav.id}');" 
                    class="delete-btn absolute top-4 right-4 bg-red-600 hover:bg-red-700 text-white text-2xl w-10 h-10 rounded-2xl flex items-center justify-center shadow-2xl">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        `;
        grid.innerHTML += cardHTML;
      });
    }

    // ==================== FONDO BLUR DINÁMICO ====================
    function iniciarFondoDinamico() {
      const backdrops = favoritos.map(f => f.poster).filter(Boolean);
      if (backdrops.length === 0) return;
      const bg1 = document.getElementById('bg1');
      const bg2 = document.getElementById('bg2');
      let indice = 0, activo = bg1, inactivo = bg2;
      bg1.src = backdrops[0];
      setInterval(() => {
        indice = (indice + 1) % backdrops.length;
        inactivo.src = backdrops[indice];
        activo.style.opacity = '0';
        inactivo.style.opacity = '1';
        [activo, inactivo] = [inactivo, activo];
      }, 7000);
    }

    // ==================== INICIO ====================
    window.addEventListener("load", loadFavoritos);
    window.deleteFavorite = deleteFavorite;
    window.deleteAllFavorites = deleteAllFavorites;
  </script>
</body>
</html>
