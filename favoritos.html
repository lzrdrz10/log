<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mis Favoritos - LzPlay</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Netflix+Sans:wght@400;500;700&display=swap');
    
    body { 
      font-family: 'Netflix Sans', 'Poppins', sans-serif;
      background: #141414;
    }
    
    #preloader {
      position: fixed; inset: 0; background: #141414;
      display: flex; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.8s ease;
    }
    #preloader.hide { opacity: 0; pointer-events: none; }
    
    .header {
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(12px);
    }
    
    .netflix-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      border-radius: 8px;
    }
    
    .netflix-card:hover {
      transform: scale(1.08);
      box-shadow: 0 20px 25px -5px rgb(229 9 20);
    }
    
    .delete-btn {
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .netflix-card:hover .delete-btn {
      opacity: 1;
    }
    
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-[#141414] text-white min-h-screen">

  <!-- PRELOADER -->
  <div id="preloader">
    <div class="preloader-content flex flex-col items-center">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi3dK3-XAKrEia-lWmiUqAYRfFQ1lR9eJX6ZZH8e_vHf576qf9GJjIWBW9Jg5LsilXX7WO2MOEkg5gzc4pESziaPeMJ9ws9mwtCDdp3p_17D0e0Uop_ZxavwwJeNLBvoyZJ0cxTKQpjzrJIR6LjJslB24tj-77AYrRCacQ3F2S2VPoXpPzPhM1zndxyd1Rg/s3307/B64D5386-DCA4-410B-A0A6-6ACB19D0A06F.png" alt="Logo" class="w-56 mb-6" />
      <div class="w-52 h-1.5 bg-zinc-700 rounded-full overflow-hidden">
        <div class="prog-bar w-0 h-full bg-gradient-to-r from-red-600 to-[#E50914] rounded-full animate-[loadbar_3s_forwards]"></div>
      </div>
      <p class="text-sm text-zinc-400 mt-4 tracking-widest">CARGANDO TUS FAVORITOS...</p>
    </div>
  </div>

  <!-- HEADER -->
  <header class="header fixed top-0 left-0 w-full z-50 py-4 border-b border-white/10">
    <div class="max-w-screen-2xl mx-auto px-8 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="https://playerfreelz.blogspot.com" class="flex items-center gap-2 text-white hover:text-[#E50914] transition-colors">
          <i class="fas fa-arrow-left text-xl"></i>
          <span class="text-lg font-medium">Volver</span>
        </a>
        <div class="flex items-center gap-3">
          <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi3dK3-XAKrEia-lWmiUqAYRfFQ1lR9eJX6ZZH8e_vHf576qf9GJjIWBW9Jg5LsilXX7WO2MOEkg5gzc4pESziaPeMJ9ws9mwtCDdp3p_17D0e0Uop_ZxavwwJeNLBvoyZJ0cxTKQpjzrJIR6LjJslB24tj-77AYrRCacQ3F2S2VPoXpPzPhM1zndxyd1Rg/s3307/B64D5386-DCA4-410B-A0A6-6ACB19D0A06F.png" alt="LzPlay" class="h-8" />
          <h1 class="text-3xl font-bold tracking-tighter text-white">Mis Favoritos</h1>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="deleteAllFavorites()" 
                class="glass flex items-center gap-2 px-6 py-2.5 rounded-full text-sm font-semibold hover:bg-red-600 hover:text-white transition-all">
          <i class="fas fa-trash-alt"></i>
          <span>Eliminar todos</span>
        </button>

        <div onclick="logout()" class="flex items-center justify-center w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 cursor-pointer transition-all">
          <i class="fas fa-sign-out-alt text-lg"></i>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-screen-2xl mx-auto px-8 pt-24 pb-12">
    <section id="content-section" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-6">
      <!-- Tarjetas generadas por JS -->
    </section>

    <div id="pagination" class="flex justify-center items-center gap-6 mt-12 hidden">
      <button id="prevPage" onclick="prevPage()" 
              class="px-8 py-3 glass rounded-full flex items-center gap-2 disabled:opacity-30 transition-all">
        <i class="fas fa-chevron-left"></i> Anterior
      </button>
      <span id="pageInfo" class="text-white/70 font-medium px-6 py-2"></span>
      <button id="nextPage" onclick="nextPage()" 
              class="px-8 py-3 glass rounded-full flex items-center gap-2 disabled:opacity-30 transition-all">
        Siguiente <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDA6mRLGymepNx3EXoCOH7CUiBXd6syGeg",
      authDomain: "sign-in-method-b7675.firebaseapp.com",
      projectId: "sign-in-method-b7675",
      storageBucket: "sign-in-method-b7675.firebasestorage.app",
      messagingSenderId: "713340652755",
      appId: "1:713340652755:web:57fc07b795dc503391d826",
      measurementId: "G-E7C8KNRSSZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ITEMS_PER_PAGE = 18;
    let favoritos = [];
    let currentPage = 1;
    let currentUserUid = null;

    // ==================== CREDENCIALES ====================
    function saveCredentials(email, password) {
      localStorage.setItem("email", email);
      localStorage.setItem("password", password);
    }
    function clearCredentials() {
      localStorage.removeItem("email");
      localStorage.removeItem("password");
    }

    // ==================== AUTO-LOGIN ====================
    async function tryAutoLogin() {
      const params = new URLSearchParams(window.location.search);
      let email = params.get("email");
      let password = params.get("pass");
      if (!email || !password) {
        email = localStorage.getItem("email");
        password = localStorage.getItem("password");
      }
      if (!email || !password) return false;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        saveCredentials(email, password);
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        return true;
      } catch (e) {
        console.error("Autologin falló:", e);
        clearCredentials();
        return false;
      }
    }

    // ==================== ELIMINAR FAVORITOS ====================
    async function deleteFavorite(docId) {
      if (!currentUserUid || !confirm("¿Eliminar este favorito?")) return;
      try {
        await deleteDoc(doc(db, `users/${currentUserUid}/favorites`, docId));
        favoritos = favoritos.filter(f => f.id !== docId);
        renderPage(currentPage);
        showToast("Favorito eliminado");
      } catch (e) {
        showToast("Error al eliminar", "#E50914");
      }
    }

    async function deleteAllFavorites() {
      if (!currentUserUid || favoritos.length === 0) return;
      if (!confirm(`¿Eliminar los ${favoritos.length} favoritos?`)) return;

      try {
        for (const fav of favoritos) {
          await deleteDoc(doc(db, `users/${currentUserUid}/favorites`, fav.id));
        }
        favoritos = [];
        renderEmptyState();
        showToast("Todos los favoritos eliminados");
      } catch (e) {
        showToast("Error al eliminar todos", "#E50914");
      }
    }

    // ==================== TOAST ====================
    function showToast(message, color = "#E50914") {
      const toast = document.createElement("div");
      toast.style.cssText = `position:fixed; bottom:30px; right:30px; background:${color}; color:white; padding:14px 24px; border-radius:9999px; box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.3); z-index:99999; font-weight:600; display:flex; align-items:center; gap:8px;`;
      toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function logout() {
      if (confirm("¿Cerrar sesión y borrar credenciales guardadas?")) {
        clearCredentials();
        window.location.href = "https://lzrdrz10.github.io/log/";
      }
    }

    // ==================== CARGAR Y RENDERIZAR ====================
    async function loadFavoritos() {
      const preloader = document.getElementById("preloader");
      try {
        await tryAutoLogin();
        const user = auth.currentUser;
        if (!user) {
          const loginUrl = "https://lzrdrz10.github.io/log/";
          const returnTo = encodeURIComponent(window.location.href);
          window.location.href = `${loginUrl}?returnTo=${returnTo}`;
          return;
        }
        currentUserUid = user.uid;

        const q = query(collection(db, `users/${user.uid}/favorites`), orderBy("savedAt", "desc"));
        const snapshot = await getDocs(q);

        favoritos = snapshot.docs.map(doc => {
          const data = doc.data();
          return {
            id: doc.id,
            titulo: data.title || "Sin título",
            url: data.url,
            año: data.year || "—",
            poster: data.poster || "https://picsum.photos/id/1015/300/450"
          };
        });

        if (favoritos.length === 0) {
          renderEmptyState();
        } else {
          renderPage(1);
        }
      } catch (e) {
        console.error(e);
        document.getElementById("content-section").innerHTML = `
          <div class="col-span-full text-center py-20">
            <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
            <p class="text-xl">No se pudieron cargar tus favoritos</p>
          </div>`;
      } finally {
        preloader.classList.add("hide");
      }
    }

    function renderEmptyState() {
      const contenedor = document.getElementById("content-section");
      contenedor.innerHTML = `
        <div class="col-span-full flex flex-col items-center justify-center py-20 text-center">
          <i class="fas fa-heart text-8xl text-white/10 mb-6"></i>
          <h2 class="text-4xl font-bold mb-3">Aún no tienes favoritos</h2>
          <p class="text-white/60 max-w-md mb-8">Guarda tus películas y series favoritas presionando el ❤️ en el reproductor.</p>
          <a href="https://www.lzplayhd.xyz" class="bg-[#E50914] hover:bg-red-700 px-10 py-4 rounded-full text-lg font-semibold inline-flex items-center gap-3 transition-all">
            <i class="fas fa-play"></i> Explorar contenido
          </a>
        </div>`;
      document.getElementById("pagination").classList.add("hidden");
    }

    function renderPage(page) {
      currentPage = page;
      const contenedor = document.getElementById("content-section");
      contenedor.innerHTML = "";

      const start = (page - 1) * ITEMS_PER_PAGE;
      const pageItems = favoritos.slice(start, start + ITEMS_PER_PAGE);

      pageItems.forEach(fav => {
        const cardHTML = `
          <div class="netflix-card bg-[#222] cursor-pointer group" onclick="window.open('${fav.url}', '_blank')">
            <div class="relative">
              <img src="${fav.poster}" alt="${fav.titulo}" class="w-full aspect-[2/3] object-cover rounded-t-lg">
              <button onclick="event.stopImmediatePropagation(); deleteFavorite('${fav.id}');" 
                      class="delete-btn absolute top-3 right-3 w-8 h-8 bg-black/70 hover:bg-[#E50914] text-white rounded-full flex items-center justify-center text-xl font-bold z-10">
                ✕
              </button>
              <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all flex items-end p-4">
                <div>
                  <p class="font-semibold text-lg leading-tight">${fav.titulo}</p>
                  <p class="text-sm text-white/70">${fav.año}</p>
                </div>
              </div>
            </div>
          </div>`;
        contenedor.innerHTML += cardHTML;
      });

      if (pageItems.length === 0 && favoritos.length > 0) {
        contenedor.innerHTML = `<div class="col-span-full text-center py-12 text-white/50">No hay más favoritos en esta página.</div>`;
      }

      actualizarPaginacion();
      document.getElementById("pagination").classList.remove("hidden");
    }

    function actualizarPaginacion() {
      const totalPages = Math.ceil(favoritos.length / ITEMS_PER_PAGE);
      document.getElementById("pageInfo").textContent = `${currentPage} de ${totalPages}`;
      document.getElementById("prevPage").disabled = currentPage === 1;
      document.getElementById("nextPage").disabled = currentPage >= totalPages;
    }

    function prevPage() { if (currentPage > 1) renderPage(currentPage - 1); }
    function nextPage() {
      const total = Math.ceil(favoritos.length / ITEMS_PER_PAGE);
      if (currentPage < total) renderPage(currentPage + 1);
    }

    // ==================== EXPONER FUNCIONES GLOBALMENTE ====================
    window.deleteFavorite = deleteFavorite;
    window.deleteAllFavorites = deleteAllFavorites;
    window.logout = logout;
    window.prevPage = prevPage;
    window.nextPage = nextPage;

    // ==================== INICIO ====================
    window.addEventListener("load", loadFavoritos);

    // Seguridad preloader
    setTimeout(() => {
      const preloader = document.getElementById("preloader");
      if (preloader) preloader.classList.add("hide");
    }, 8000);
  </script>
</body>
</html>
