<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mis Favoritos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: "Poppins", sans-serif; }
    :root { --preloader-time: 3s; }
    #preloader {
      position: fixed; inset: 0; background: #141414;
      display: flex; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.8s ease;
    }
    #preloader.hide { opacity: 0; pointer-events: none; }
    .preloader-content { text-align: center; color: #65615F; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .preloader-content img { width: 220px; max-width: 80vw; filter: drop-shadow(0px -2px 9px #303030); }
    .prog-bar-wrapper { width: 205px; height: 6px; position: relative; border-radius: 50px; overflow: hidden; }
    .prog-bar-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #919191; border-radius: 50px; }
    .prog-bar { position: absolute; top: 0; left: 0; width: 0; height: 100%; background: linear-gradient(to right,#e300ff,#007cf0); border-radius: 50px; animation: loadbar var(--preloader-time) forwards; }
    @keyframes loadbar { to { width: 100%; } }
    .preloader-extra { display: grid; grid-template-columns: auto 1fr; align-items: center; font-size: 12px; gap: 8px; }
    .spinner div { width: 20px; height: 20px; border: 4px solid #65615F; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-[#04143B] text-white min-h-screen">
  <!-- PRELOADER -->
  <div id="preloader">
    <div class="preloader-content">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi3dK3-XAKrEia-lWmiUqAYRfFQ1lR9eJX6ZZH8e_vHf576qf9GJjIWBW9Jg5LsilXX7WO2MOEkg5gzc4pESziaPeMJ9ws9mwtCDdp3p_17D0e0Uop_ZxavwwJeNLBvoyZJ0cxTKQpjzrJIR6LjJslB24tj-77AYrRCacQ3F2S2VPoXpPzPhM1zndxyd1Rg/s3307/B64D5386-DCA4-410B-A0A6-6ACB19D0A06F.png" alt="Logo Preloader" />
      <div class="prog-bar-wrapper">
        <div class="prog-bar-bg"></div>
        <div class="prog-bar"></div>
      </div>
      <div class="preloader-extra">
        <div class="spinner"><div></div></div>
        <p>Espere, cargando tus favoritos...</p>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="fixed top-0 left-0 w-full z-50 bg-[#04143B] flex flex-col md:flex-row items-center justify-between px-4 py-3 max-w-[1280px] mx-auto">
    <div class="flex items-center space-x-4 w-full md:w-auto justify-between">
      <div class="flex flex-row items-center space-x-3 mb-6">
       <button onclick="window.location.href='https://playerfreelz.blogspot.com'" 
class="bg-[#0D1B4C] rounded-full px-4 py-1.5 text-sm font-semibold text-[#4A7FFF] flex items-center space-x-1">
  <i class="fas fa-arrow-left"></i><span>Atrás</span>
</button>
        <h1 class="text-2xl font-extrabold text-[#4A7FFF] select-none">Mis Favoritos</h1>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-[1280px] mx-auto px-4 mt-24">
    <section id="content-section" class="grid grid-cols-3 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
      <!-- Contenido cargado dinámicamente -->
    </section>
    <div class="flex justify-center items-center gap-4 mt-6 mb-10">
      <button id="prevPage" class="bg-[#0D1B4C] text-white px-4 py-2 rounded hover:bg-[#1A2A6C] disabled:opacity-50" disabled>Atrás</button>
      <button id="nextPage" class="bg-[#0D1B4C] text-white px-4 py-2 rounded hover:bg-[#1A2A6C]" disabled>Siguiente</button>
    </div>
  </main>

  <script type="module">
    // ==================== PRELOADER ====================
    document.addEventListener("DOMContentLoaded", () => {
      const preloader = document.getElementById("preloader");
      const duration = getComputedStyle(document.documentElement).getPropertyValue("--preloader-time").trim();
      const ms = parseFloat(duration) * (duration.includes("ms") ? 1 : 1000);
      setTimeout(() => preloader.classList.add("hide"), ms);
    });

    // ==================== FIREBASE ====================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDA6mRLGymepNx3EXoCOH7CUiBXd6syGeg",
      authDomain: "sign-in-method-b7675.firebaseapp.com",
      projectId: "sign-in-method-b7675",
      storageBucket: "sign-in-method-b7675.firebasestorage.app",
      messagingSenderId: "713340652755",
      appId: "1:713340652755:web:57fc07b795dc503391d826",
      measurementId: "G-E7C8KNRSSZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ITEMS_PER_PAGE = 15;
    let favoritos = [];
    let currentPage = 1;

    // ==================== LOCALSTORAGE ====================
    function saveCredentials(email, password) {
      localStorage.setItem("email", email);
      localStorage.setItem("password", password);
    }
    function clearCredentials() {
      localStorage.removeItem("email");
      localStorage.removeItem("password");
    }

    // ==================== AUTO-LOGIN MEJORADO ====================
    async function tryAutoLogin() {
      const params = new URLSearchParams(window.location.search);
      let email = params.get("email");
      let password = params.get("pass");

      // Si no vienen por URL, usar localStorage
      if (!email || !password) {
        email = localStorage.getItem("email");
        password = localStorage.getItem("password");
      }

      if (!email || !password) return false;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        saveCredentials(email, password);   // Guardado automático
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
        return true;
      } catch (e) {
        console.error("Autologin falló:", e);
        clearCredentials();
        return false;
      }
    }

    // ==================== CARGAR FAVORITOS ====================
    async function loadFavoritos() {
      await tryAutoLogin();               // ← Auto-login desde URL o localStorage
      const user = auth.currentUser;

      if (!user) {
        const loginUrl = "https://lzrdrz10.github.io/log/";
        const returnTo = encodeURIComponent(window.location.href);
        window.location.href = `${loginUrl}?returnTo=${returnTo}`;
        return;
      }

      try {
        const q = query(collection(db, `users/${user.uid}/favorites`), orderBy("savedAt", "desc"));
        const snapshot = await getDocs(q);
        favoritos = snapshot.docs.map(doc => {
          const data = doc.data();
          return {
            tipo: "Favorito",
            titulo: data.title || "Sin título",
            url: data.url,
            año: data.year || "—",
            poster: data.poster || "https://via.placeholder.com/300x450?text=No+Image"
          };
        });

        if (favoritos.length === 0) {
          renderEmptyState();
        } else {
          renderPage(currentPage);
        }
      } catch (e) {
        console.error("Error al cargar favoritos:", e);
        document.getElementById("content-section").innerHTML = `
          <div class="col-span-full text-center text-red-400 py-12">
            <i class="fas fa-exclamation-triangle text-4xl mb-4"></i>
            <p>Error al cargar tus favoritos. Intenta más tarde.</p>
          </div>`;
      }
    }

    function renderEmptyState() { /* ... igual que antes ... */ 
      const contenedor = document.getElementById("content-section");
      contenedor.innerHTML = `
        <div class="col-span-full text-center py-16">
          <i class="fas fa-heart text-7xl text-gray-500 mb-6"></i>
          <h2 class="text-2xl font-semibold mb-2">Aún no tienes favoritos</h2>
          <p class="text-white/70 max-w-md mx-auto">Ve a cualquier película o serie y presiona el botón ❤️ para guardarla aquí.</p>
          <a href="https://www.lzplayhd.xyz" class="inline-block mt-8 bg-[#4A7FFF] text-white px-8 py-3 rounded-lg font-semibold hover:bg-[#3a66cc]">
            Explorar contenido
          </a>
        </div>`;
    }

    function renderPage(page) { /* ... igual que antes ... */ 
      const contenedor = document.getElementById("content-section");
      contenedor.innerHTML = "";
      const startIndex = (page - 1) * ITEMS_PER_PAGE;
      const pageItems = favoritos.slice(startIndex, startIndex + ITEMS_PER_PAGE);
      pageItems.forEach(e => {
        const article = document.createElement("article");
        article.className = "relative rounded-lg overflow-hidden cursor-pointer select-none";
        article.innerHTML = `
          <a href="${e.url}" target="_blank">
            <img src="${e.poster}" alt="${e.titulo}" loading="lazy" class="w-full h-auto rounded-lg object-cover transition-transform duration-300 hover:scale-105"/>
            <div class="absolute top-2 right-2 bg-white/90 text-black text-xs font-semibold rounded-full px-2 py-0.5">${e.tipo}</div>
          </a>
          <div class="mt-2 font-semibold text-sm leading-tight truncate">${e.titulo}</div>
          <div class="text-xs text-white/70">${e.año}</div>
        `;
        contenedor.appendChild(article);
      });
      if (pageItems.length === 0 && favoritos.length > 0) {
        contenedor.innerHTML = `<div class="col-span-full text-center text-white/70 py-8"><p>No hay más favoritos en esta página.</p></div>`;
      }
      actualizarBotones();
    }

    function actualizarBotones() {
      const totalPages = Math.ceil(favoritos.length / ITEMS_PER_PAGE);
      document.getElementById("prevPage").disabled = currentPage === 1;
      document.getElementById("nextPage").disabled = currentPage >= totalPages;
    }

    document.getElementById("prevPage").addEventListener("click", () => { if (currentPage > 1) { currentPage--; renderPage(currentPage); } });
    document.getElementById("nextPage").addEventListener("click", () => {
      const totalPages = Math.ceil(favoritos.length / ITEMS_PER_PAGE);
      if (currentPage < totalPages) { currentPage++; renderPage(currentPage); }
    });

    // ==================== INICIO ====================
    window.addEventListener("load", loadFavoritos);
  </script>
</body>
</html>
